name: Build VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installable theme package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated theme variants
        run: node scripts/build-theme-variants.js

      - name: Package VS Code extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixels-to-punk-cyber-vsix
          path: pixels-to-punk-cyber-*.vsix
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" pixels-to-punk-cyber-*.vsix \
            --title "$GITHUB_REF_NAME" \
            --notes "Download the VSIX file below, then install it in VS Code with Extensions: Install from VSIX."
